<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Boletero DNI</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .contenedor {
            background: white;
            margin: 50px auto;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .resultado {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>Sistema Boletero</h2>

    <input type="text" id="dni" placeholder="Ingrese DNI">

    <button onclick="buscar()">Buscar</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>
    // 🔹 "Base de datos" simulada
    const personas = {
        "12345678": {nombre: "Juan", apellido: "Perez"},
        "87654321": {nombre: "Maria", apellido: "Lopez"}
    };

    function buscar() {
        let dni = document.getElementById("dni").value;
        let resultado = document.getElementById("resultado");

        if (dni === "") {
            resultado.innerHTML = "Ingrese DNI";
            return;
        }

        if (personas[dni]) {
            let p = personas[dni];
            resultado.innerHTML = `
                Nombre: ${p.nombre} <br>
                Apellido: ${p.apellido}
            `;
        } else {
            resultado.innerHTML = "DNI no encontrado";
        }
    }
</script>

</body>
</html>
